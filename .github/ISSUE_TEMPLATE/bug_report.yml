name: 🐛 Bug Report / Bug 报告
description: File a bug report / 报告一个 bug
title: "[Bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Thanks for taking the time to report a bug! / 感谢你花时间报告 bug！"
  - type: textarea
    id: description
    attributes:
      label: Description / 描述
      description: What happened? / 发生了什么问题？
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce / 复现步骤
      description: How to trigger this bug? / 如何触发这个 bug？
      placeholder: |
        1. Go to / 打开 ...
        2. Click / 点击 ...
        3. See error / 看到错误 ...
  - type: input
    id: version
    attributes:
      label: Environment / 环境
      description: Deployment platform, browser, etc / 部署平台、浏览器等
      placeholder: Vercel / Docker / Netlify
  - type: textarea
    id: logs
    attributes:
      label: Logs / 日志
      description: Relevant error logs (if any) / 相关的错误日志（如有）
      render: shell
