name: 💡 Feature Request
description: 建议一个新功能
title: "[Feature] "
labels: [enhancement]
body:
  - type: textarea
    id: description
    attributes:
      label: 功能描述
      description: 你希望添加什么功能？
    validations:
      required: true
  - type: textarea
    id: usecase
    attributes:
      label: 使用场景
      description: 什么场景下需要这个功能？
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 有其他实现方式吗？
